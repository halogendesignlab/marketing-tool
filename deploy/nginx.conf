server {
    listen 80;
    server_name portal.halogendesignlabs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name portal.halogendesignlabs.com;

    # SSL managed by certbot
    ssl_certificate /etc/letsencrypt/live/portal.halogendesignlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.halogendesignlabs.com/privkey.pem;

    # Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
